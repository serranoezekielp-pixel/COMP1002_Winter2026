<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <title>Lab 2: Add Some Style</title>

     <!--A bit of web design -->
     <style>
/*style for the body itself*/
  body {
  background: #f0f0f0;
  font-family: Arial, sans-serif;
  color: #a16b67;
}

/*style for the form container*/
form {
  background: white;
  width: 350px;
  margin: 30px auto;
  padding: 20px;
  border: 2px solid #0077cc;
  border-radius: 8px;

}

/*style for all input fields*/
.input-field {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 4px;
}

/*style for the first name input field*/
#firstname{
  color: #0077cc;
  font-weight: bold;
}

/*also made the last name bold like the first name to make it more appealing*/
#lastname{
    color: #0077cc;
    font-weight: bold;
  }

/*style for text, email and password input fields*/
input[type="text"], input[type="email"], input[type="password"] {
  background-color: #ffffff;
}

/*targets the submit button*/
input[type="submit"] {
  padding: 10px 25px;
  background-color: #28a745;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;

}

 /*hover effect on the submit button*/
input[type="submit"]:hover {
  background-color: #1ba126;
}

/*this one is used to target the checkbox options*/
.checkbox-style{
  margin-top: 10px;

}

/*specifically selects the label*/
label {
  font-size: 14px;
  color: #333;
  display: block;
  margin-top: 10px;
  
}

/*selects the text box for comments*/
#comments{
  width: 90%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background-color: white;

}
     </style>
</head>

<body>
      <!--Fixed this header so that it is aligned and has a color-->
     <h1 style ="color: #0077cc; text-align: center;">User Registration Form</h1>

     <!-- form starts here -->
     <form method="post" action="">

          <fieldset>

               <!--legend explains the info in the fieldset -->
               <legend>User Registration Form</legend>

               <p>Fill up the blank details</p>

               <!--First name-->
               <label for="firstname">First Name:</label>
               <input type="text" name="First Name" id="firstname" placeholder="First Name">

               <!--Last Name-->
               <label for="LastName">Last Name:</label>
               <input type="text" name="lastname" id="lastname" placeholder="Last Name">

               <!--Email address-->
               <label for="emailaddress">Email Address: </label>
               <input type="email" name="email" id="email" placeholder="you@example.com" required>

               <!--Password-->
               <label for="password">Password: *</label>
               <input type="password" name="password" id="password" placeholder="Min. 8 Characters" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$
               "title ="Must contain one number, one uppercase character, one lowercase character and be 8 characters in length and a special character" required>

               <!--confirm password-->
               <label for="password_confirm">Confirm Password:</label>
               <input type="password" name="password_confirm" id="password_confirm" placeholder="Retype Password">

               <!-- Date of birth -->
               <label for="birthday">Date of Birth:</label>
               <input type="date" name="birthday" id="birthday">
                 
               <!--Gender options-->
               <label>Gender:</label>
               <label><input type="radio" name="gender" value="male"> Male</label>
               <label><input type="radio" name="gender" value="female"> Female</label>
               <label><input type="radio" name="gender" value="other"> Other</label>

               <!--Country Choices-->
               <label for="country">Country:</label>
               <select id="country" name="country">
               <option value="">Select Country</option>
               <option value="usa">USA</option>
               <option value="canada">Canada</option>
               <option value="mexico">Mexico</option>
               </select>

               <!-- Preferences -->
               <label><input type="checkbox" name="subscribe" value="yes"> Subscribe to Newsletter</label>
               <label><input type="checkbox" name="terms" value="agree"> I agree to the Terms & Conditions</label>

               <!--Additional comments-->
               <label for="comments">Comments:</label>
               <textarea id="comments" name="comments" placeholder="Any additional comments..."></textarea>

               <!--submit button-->
               <input type="submit" value="Submit Form">

          </fieldset>

     </form>

</body>
</html>
