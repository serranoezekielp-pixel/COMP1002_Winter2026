<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Listener Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Event Listener Demo</h1>

    <!-- Anonymous vs Named Function -->
    <section>
        <h2>Buttons</h2>
        <button id="anonBtn">Anonymous Function Button</button>
        <button id="namedBtn">Named Function Button</button>
    </section>

    <!-- Multiple Events -->
    <section>
        <h2>Hover Box</h2>
        <div id="hoverBox">Hover over me</div>
    </section>

    <!-- Input Event -->
    <section>
        <h2>Live Input</h2>
        <input type="text" id="textInput" placeholder="Type something...">
        <p id="outputText"></p>
    </section>

    <!-- Form -->
    <section>
        <h2>Form Example</h2>
        <form id="demoForm">
            <label for="nameInput">Enter your name:</label>
            <input type="text" id="nameInput">
            <button type="submit">Submit</button>
        </form>
        <p id="formOutput"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
